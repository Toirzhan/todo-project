<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>AI Assistant 2.0</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f0f10, #1c1c22);
            color: white;
        }

        .container {
            max-width: 800px;
            margin: auto;
            padding: 20px;
        }

        h2 {
            text-align: center;
        }

        #chat-box {
            height: 70vh;
            overflow-y: auto;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            backdrop-filter: blur(10px);
        }

        .msg {
            padding: 12px 16px;
            border-radius: 16px;
            max-width: 70%;
            animation: fadeIn 0.3s ease-in-out;
            white-space: pre-wrap;
        }

        .user {
            background: #4a90e2;
            align-self: flex-end;
        }

        .ai {
            background: #2c2c2f;
            align-self: flex-start;
        }

        .typing {
            font-style: italic;
            opacity: 0.6;
        }

        #input-box {
            display: flex;
            margin-top: 15px;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            outline: none;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            background: #4a90e2;
            color: white;
            cursor: pointer;
        }

        button:disabled {
            background: gray;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

<div class="container">

    <h2>🤖 AI Assistant 2.0</h2>

    <div id="chat-box"></div>

    <div id="input-box">
        <input id="msg" placeholder="Напиши сообщение..." />
        <button id="btn" onclick="send()">Отправить</button>
    </div>

</div>

<script>

    console.log("JS LOADED");

function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}

function addMessage(text, type) {
    const box = document.getElementById("chat-box");

    const div = document.createElement("div");

    div.classList.add("msg");
    div.classList.add(type); // только ОДИН класс

    div.innerText = text;

    box.appendChild(div);
    box.scrollTop = box.scrollHeight;

    return div;
}

function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
}

async function send() {
    let input = document.getElementById("msg");
    let btn = document.getElementById("btn");
    let message = input.value;

    if (!message) return;

    addMessage(message, "user");
    input.value = "";

    btn.disabled = true;

    // typing indicator
   let typing = addMessage("AI печатает...", "ai");
    typing.classList.add("typing");
    await sleep(800); // задержка как у ChatGPT

    fetch("/ai/", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded",
            "X-CSRFToken": getCookie("csrftoken")
        },
        body: "message=" + encodeURIComponent(message)
    })
    .then(res => res.json())
    .then(async data => {

        typing.remove();

        // эффект “печатает ответ”
        let text = "";
        let msg = addMessage("", "ai");

        for (let i = 0; i < data.answer.length; i++) {
            text += data.answer[i];
            msg.innerText = text;
            await sleep(10);
        }

        btn.disabled = false;
    })
    .catch(err => {
        typing.remove();
        addMessage("Ошибка сервера", "ai");
        btn.disabled = false;
        console.log(err);
    });
}

document.addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        send();
    }
});
</script>

</body>
</html>
